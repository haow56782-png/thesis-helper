# 重庆城市科技学院 本科毕业论文格式
# ============================================================
# ⚠️  状态：占位 (PLACEHOLDER) — 当前数值沿用 generic 默认值
# ⚠️  原因：未取得该校官方《本科毕业论文撰写规范》文档
# ⚠️  使用此模板的 PDF 与该校真实规范可能存在差异，请勿直接交付
#
# 待补充字段（标 ❓ 的需校方文档确认）：
#   ❓ sizes.h1                 章标题字号（小三 15pt？三号 16pt？）
#   ❓ sizes.title              论文大标题字号
#   ❓ paragraph.leading        行距具体值
#   ❓ chapter_prefix           章节前缀样式
#   ❓ cover                    封面是否使用学校预制图片模板
#   ❓ header / footer          页眉页脚要求
#   ❓ bibliography.style       参考文献样式细节（顺序编码 vs 著者-出版年）
