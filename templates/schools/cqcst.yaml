_status: placeholder         # 程序读取此字段触发警告
_status_note: "等待《重庆城市科技学院本科毕业论文撰写规范》原文确认"

school_id: cqcst
school_name: "重庆城市科技学院"
cover_subtitle: "本科毕业论文（设计）"

fonts:
  songti: ["Source Han Serif SC", "Noto Serif CJK SC", "SimSun"]
  heiti:  ["Source Han Sans SC",  "Noto Sans CJK SC",  "SimHei"]
  kaiti:  ["KaiTi", "STKaiti"]
  en:     ["Times New Roman", "Liberation Serif"]

sizes:
  body:  "小四"      # 12pt（待确认）
  h1:    "三号"      # 16pt（待确认：可能是小三 15pt）
  h2:    "四号"      # 14pt
  h3:    "小四"      # 12pt
  title: "二号"      # 22pt
  fig_caption: "五号"

page:
  paper: "a4"
  margin:
    top:    "2.5cm"
    bottom: "2.5cm"
    left:   "3cm"
    right:  "2.5cm"

paragraph:
  leading: "1em"        # ≈ 1.5 倍行距视觉
  spacing: "0.7em"
  first_indent: "2em"

chapter_prefix: chinese

bibliography:
  style: "gb-7714-2015-numeric"
